# Build, lint, type-check, and test; then deploy to GAE on pushes to main.
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and test Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel any in-progress run for the same workflow + ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        python-version: "3.12"
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"
    - name: Lint with ruff
      run: uv run ruff check --output-format=github .
    - name: Type check with mypy
      run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.0.0
      with:
        enable-cache: true
        python-version: "3.12"
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"
    - name: Test with pytest
      env:
        TZ: America/Los_Angeles
      run: uv run pytest

  deploy-to-gae:
    if: startsWith(github.ref, 'refs/heads/main')  # only deploy on push to main
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    environment: google-app-engine
    needs: [lint, test]
    name: Check out and deploy to GAE
    steps:
    - id: 'checkout'
      uses: 'actions/checkout@v6'
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v3'
      with:
        workload_identity_provider: '${{ vars.GOOGLE_WIF_PROVIDER_NAME }}'
        service_account: '${{ vars.GOOGLE_SERVICE_ACCOUNT_EMAIL }}'
    - id: 'deploy'
      name: 'Deploy to App Engine'
      uses: 'google-github-actions/deploy-appengine@v3'
      with:
        project_id: '${{ vars.GOOGLE_PROJECT_ID }}'
    - id: 'test'
      name: 'Check operational status'
      run: |-
        curl '${{ steps.deploy.outputs.version_url }}' \
        --silent \
        --fail \
        --location \
        --retry 5 \
        --retry-connrefused \
        --retry-delay 5 \
        --retry-max-time 300
