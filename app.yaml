runtime: python314
entrypoint: gunicorn -w 4 --timeout 60 -b :$PORT --pythonpath src "gpxtable.wsgi:create_app()"
env_variables:
  TZ: "America/Los_Angeles"
  ENV: "prod"

handlers:
- url: /static
  static_dir: src/gpxtable/static
  secure: always
- url: /favicon.ico
  static_files: src/gpxtable/static/favicon.ico
  secure: always
  upload: src/gpxtable/static/favicon.ico
- url: /*
  script: auto
  secure: always
